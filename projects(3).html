            font-weight: bold;

            border-radius: 20px;
            backdrop-filter: blur(6px);
        }

        .video-card h2 {
            color: white;
            margin-bottom: 15px;
        }

        video {

            max-width: 100%;
            border-radius: 15px;
        }
